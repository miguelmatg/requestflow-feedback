name: Bug report
description: Report a reproducible problem
labels:
  - bug
  - needs-triage
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible.
  - type: input
    id: extension_version
    attributes:
      label: RequestFlow version
      placeholder: 0.3.0
    validations:
      required: true
  - type: input
    id: vscode_version
    attributes:
      label: VS Code version
      placeholder: 1.110.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps in order
      placeholder: |
        1. Open RequestFlow
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs and add screenshots if available
    validations:
      required: false
